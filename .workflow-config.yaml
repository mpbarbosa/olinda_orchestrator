# AI Workflow Automation Configuration
# Project: olinda_orchestrator

project:
  name: 'olinda_orchestrator'
  type: 'typescript-library'
  # Keep project-kind guidance generic so prompts rely on the repo-specific
  # structure and toolchain declared below instead of unrelated library defaults.
  kind: 'generic'
  version: '0.4.1'
  description: 'A generic orchestrator TypeScript Library'

tech_stack:
  primary_language: 'typescript'
  secondary_languages:
    - 'javascript'
  build_system: 'npm'
  test_framework: 'vitest'
  test_runner: 'vitest'
  test_command: 'npm test'
  lint_command: 'npm run lint'
  lint_commands:
    javascript: 'npm run lint'
    typescript: 'npm run lint'
  build_command: 'npm run build'

structure:
  source_dirs:
    - src
  test_dirs:
    - src/__tests__
    - test
  docs_dirs:
    - docs
  config_files:
    - .workflow-config.yaml
    - eslint.config.js
    - package.json
    - tsconfig.eslint.json
    - tsconfig.json
    - vitest.config.js
  artifact_dir: '.ai_workflow'
  build_output: 'dist'
  exclude_paths:
    - .ai_workflow/logs
    - .ai_workflow/summaries
    - .ai_workflow/backlog
    - .ai_workflow/metrics
    - .ai_workflow/checkpoints
    - .ai_workflow/prompts
    - .ai_workflow/ml_models
    - .ai_workflow/cache
    - .ai_workflow/archive
    - .ai_workflow/archived_docs

version:
  config_files:
    - package.json
  required_files:
    - CHANGELOG.md

deploy:
  enabled: true
  script: 'scripts/deploy.sh'
  description: 'Build TypeScript, commit dist artifacts, tag the release, push to GitHub, and generate jsDelivr CDN URLs'

ai_personas:
  enabled:
    - typescript_reviewer
    - test_engineer
    - code_quality_analyst
    - architecture_reviewer
    - documentation_expert
    - technical_writer
    - devops_engineer
    - dependency_analyst
    - git_specialist
  disabled:
    - prompt_engineer
    - ux_analyst
    - accessibility_expert
    - aws_serverless_engineer
    - api_designer
    - security_expert
    - async_performance_engineer
    - performance_engineer

workflow:
  settings:
    auto_mode: false
    parallel_execution: true
    smart_execution: true
    ml_optimize: false
    multi_stage: false
    auto_commit: false

  stages:
    quick:
      enabled: true
    medium:
      enabled: true
    full:
      enabled: true

  steps:
    - id: step_00
      name: 'Pre-Analysis'
      description: 'Analyze project structure, public API surface, and changed files'
      enabled: true
      dependencies: []

    - id: step_0b
      name: 'Bootstrap Documentation'
      description: 'Create missing documentation for new or undocumented modules'
      enabled: true
      dependencies:
        - step_00

    - id: step_01
      name: 'Documentation Updates'
      description: 'Update README and docs to reflect the current public API and behaviors'
      enabled: true
      dependencies:
        - step_0b

    - id: step_01_5
      name: 'Copilot Instructions Validation'
      description: 'Audit .github/copilot-instructions.md against the live repository layout and commands'
      enabled: true
      dependencies:
        - step_01

    - id: step_02
      name: 'Consistency Analysis'
      description: 'Check consistency across source, tests, docs, and public exports'
      enabled: true
      dependencies:
        - step_01_5

    - id: step_02_5
      name: 'Documentation Optimization'
      description: 'Reduce duplication and improve documentation clarity and structure'
      enabled: true
      dependencies:
        - step_02

    - id: step_21
      name: 'Doc Consolidation'
      description: 'Consolidate overlapping documentation into canonical documents when appropriate'
      enabled: true
      dependencies:
        - step_02_5

    - id: step_03
      name: 'Script References'
      description: 'Validate documentation references to npm scripts, paths, and commands'
      enabled: true
      dependencies:
        - step_02

    - id: step_04
      name: 'Configuration Validation'
      description: 'Validate package metadata, TypeScript config files, test tooling config, and workflow configuration'
      enabled: true
      dependencies:
        - step_00

    - id: step_05
      name: 'Directory Structure'
      description: 'Validate configured source, test, docs, and build-output layout for this project'
      enabled: true
      dependencies:
        - step_04

    - id: step_06
      name: 'Test Review'
      description: 'Review the configured test suite for coverage gaps and missing cases'
      enabled: true
      dependencies:
        - step_05

    - id: step_07
      name: 'Test Generation'
      description: 'Generate missing tests for orchestrator and registry behavior when appropriate'
      enabled: true
      dependencies:
        - step_06

    - id: step_08
      name: 'Test Execution'
      description: 'Run npm test for the repository'
      enabled: true
      dependencies:
        - step_07

    - id: step_09
      name: 'Dependency Analysis'
      description: 'Audit npm dependencies and validate package health'
      enabled: true
      dependencies:
        - step_08

    - id: step_10
      name: 'Code Quality'
      description: 'Run linting and analyze TypeScript code quality patterns'
      enabled: true
      dependencies:
        - step_09

    - id: step_13
      name: 'Markdown Linting'
      description: 'Review markdown quality across README and docs'
      enabled: true
      dependencies:
        - step_10

    - id: step_11
      name: 'Context Management'
      description: 'Capture workflow context for future runs and summaries'
      enabled: true
      dependencies:
        - step_13

    - id: step_11_5
      name: 'AWS LBS Validation'
      enabled: false
      reason: 'Not applicable — this repository is not an AWS serverless or LBS project'

    - id: step_11_6
      name: 'AWS Serverless AI Review'
      enabled: false
      reason: 'Not applicable — this repository does not target AWS serverless infrastructure'

    - id: step_14
      name: 'Prompt Engineering'
      enabled: false
      reason: 'Not applicable — this repository is a general-purpose TypeScript library, not a prompt system'

    - id: step_15
      name: 'UX Analysis'
      enabled: false
      reason: 'Not applicable — there is no browser or terminal UI layer in this library'

    - id: step_16
      name: 'Version Update'
      enabled: false
      reason: 'No project-specific version propagation workflow is configured beyond package.json'

    - id: step_18
      name: 'Debugging Analysis'
      description: 'Perform AI-assisted debugging analysis for failing tests or edge cases'
      enabled: true
      dependencies:
        - step_10
      dependency_comment: "step_16 is disabled because this project does not define extra version-bearing files or a version propagation hook beyond package.json; run debugging analysis after code-quality findings from step_10 instead."

    - id: step_19
      name: 'TypeScript Review'
      description: 'Review strict typing, exported types, and TypeScript API design'
      enabled: true
      dependencies:
        - step_18

    - id: step_20
      name: 'Async Performance Review'
      enabled: false
      reason: 'Not a primary concern for the current sequential library workflow'

    - id: step_22
      name: 'Accessibility Review'
      enabled: false
      reason: 'Not applicable — there is no HTML, browser UI, or accessibility surface'

    - id: step_23
      name: 'Performance Review'
      enabled: false
      reason: 'No dedicated performance or deployment review workflow is configured yet'

    - id: step_17
      name: 'Workflow Summary'
      description: 'Generate a final workflow summary from the active analysis and validation steps'
      enabled: true
      dependencies:
        - step_03
        - step_11
        - step_19
      dependency_comment: "Disabled optional review branches are intentionally excluded for this project, so the summary should aggregate the active script-reference, context, and TypeScript-review branches instead."

    - id: step_0f
      name: 'Commit Artifacts'
      description: 'Collect workflow artifacts generated during the run'
      enabled: true
      dependencies:
        - step_17

    - id: step_12
      name: 'Git Finalization'
      description: 'Finalize git state after a workflow run'
      enabled: true
      dependencies:
        - step_0f
